# bootstrap.toml
#
# Unified image definition for the Forge base environment.
#
# Philosophy:
# - base.sqsh: A complete, self-contained OS foundation and compiler toolchain.
# This eliminates the complexity of managing separate arch-independent and 
# arch-specific layers.
#
# - stage1.sqsh: A minimal bootstrap that breaks the stage0 (Fedora 43 chroot image) ABI chain.
# Replaces with the correct glibc, and a functional gcc and enough tooling to run autotools builds.
#
# - stage2.sqsh: A fuller featured bootstrap that has enough tooling to build the final image, but is
# now on the real destination ABI

[image.base]
description = "Base OS image: POSIX utilities, interpreters, and full compiler toolchain"
format = "squashfs"
components = [
    # Core POSIX utilities
    "bash",              # Shell
    "coreutils",         # mkdir, cp, rm, ls, etc.
    "findutils",         # find, xargs
    "diffutils",         # cmp, diff
    "grep",              # Text search
    "sed",               # Stream editor
    "gawk",              # AWK interpreter
    
    # Build Systems & Generators
    "make",              # Make build system
    "ninja",             # Ninja build system
    "cmake",             # CMake build system
    "flex",              # Lexer generator
    "bison",             # Parser generator
    "m4",                # Macro processor
    
    # Compiler Toolchain
    "gcc",               # C/C++ compiler
    "binutils",          # Assembler, linker, objdump
    "gmp",               # Arbitrary precision math library
    "mpfr",              # Multiple precision floating-point
    "mpc",               # Multiple precision complex numbers
    "libxcrypt",         # Cryptographic library
    
    # Compression and archive tools
    "gzip",              # gzip compression
    "bzip2",             # bzip2 compression
    "xz",                # XZ compression
    "tar",               # Archive utility
    "zlib",              # Compression library
    
    # Runtime libraries & System Basics
    "glibc",             # C library
    "ncurses",           # Terminal handling library
    "readline",          # Line editing library
    "openssl",           # Cryptography library
    "linux-headers",     # Kernel headers
    "patch",             # Patch utility
    "rsync",             # File transfer/sync
    
    # Scripting languages
    "perl",              # Perl interpreter
    "python3",           # Python interpreter
]


[image.stage1]
description = "Bootstrap stage 1 image, minimal! only needs to be able to build autotools based components"
format = "squashfs"
components = [
    "bash",         # absolutely required for Forge compatibility
    "glibc",
    "binutils",
    "gcc",
    "make",
    "coreutils",
    "sed",
    "gawk",
    "grep",
    "tar",
    "gzip",
    "xz",
    "patch",
    "diffutils",
    "findutils",
    ##  Added based on aelf-hosting capabilities
    "rsync",
    "bison",
    "python3",
]

[roles]
description = "Role classification for image inclusion"

[roles.base]
include = ["runtime", "dev", "tool", "config", "doc", "debug"]
exclude = []
rationale = "Unified base includes all artifacts to ensure a batteries-included dev environment."

[roles.stage1]
include = ["runtime", "dev", "tool", "config", "doc", "debug"]
exclude = []
rationale = "Relatively crude bootstrap stage, just include everything."
